<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>QA visual — Fase 7.1.2</title>
    <style>
      :root { color-scheme: dark; font-family: system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; padding: 16px; overflow: auto; background: #050403; color: #e6d9b8; }
      header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 12px; }
      h1 { margin: 0; font-size: 16px; }
      output { color: #c9a35c; font-size: 12px; }
      .stage { width: max-content; min-width: 100%; transform-origin: top left; }
      iframe { display: block; height: 900px; border: 1px solid #6d5935; background: #0c0a08; }
    </style>
  </head>
  <body>
    <header>
      <h1>QA visual — Fase 7.1.2</h1>
      <output id="label"></output>
    </header>
    <div class="stage" id="stage"><iframe id="viewport" title="Viewport de QA"></iframe></div>
    <script>
      const query = new URLSearchParams(location.search);
      const width = Math.max(320, Number(query.get('width')) || 1366);
      const scale = Math.max(0.25, Number(query.get('scale')) || 1);
      const path = (query.get('path') || 'guardioes/eldric/').replace(/^\/+/, '');
      const frame = document.querySelector('#viewport');
      frame.width = String(width);
      frame.src = `../${path}`;
      document.querySelector('#stage').style.transform = `scale(${scale})`;
      document.querySelector('#label').textContent = `${width}px · escala visual ${scale} · ${path}`;
    </script>
  </body>
</html>
